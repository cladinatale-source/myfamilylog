<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Family Manager Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; margin-bottom: 15px; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; margin-bottom: 15px; background: #F1F5F9; }
        .group-header { display: flex; justify-content: space-between; background: #F1F5F9; padding: 15px; font-weight: 700; border-radius: 15px 15px 0 0; }
        .group-row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 12px 15px; border-bottom: 1px solid #F1F5F9; background: white; font-size: 13px; }
        #sync-banner { background: #E0E7FF; color: #4338CA; padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 15px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="sync-banner">🔄 Sincronizzazione in corso...</div>

    <div id="p-home" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Family Log 🏠</h1>
            <button onclick="nav('setup')" style="background:none; border:none; font-size:24px;">⚙️</button>
        </div>
        <div class="card" onclick="nav('inserimento')"><h2>➕ Registra Ore</h2></div>
        <div class="card" onclick="nav('riepilogo')"><h2>📊 Da Saldare</h2></div>
        <div class="card" onclick="nav('storico')"><h2>📜 Storico</h2></div>
    </div>

    <div id="p-inserimento" class="page">
        <button onclick="nav('home')">← Indietro</button>
        <div class="card">
            <label>Collaborator*</label><select id="ins-chi"></select>
            <label>Data</label><input type="date" id="ins-data">
            <label>Ore</label><input type="number" id="ins-ore" step="0.5" value="1">
            <button class="btn-main" onclick="saveData()">SALVA</button>
        </div>
    </div>

    <div id="p-riepilogo" class="page"><button onclick="nav('home')">← Indietro</button><div id="content-riepilogo"></div></div>
    <div id="p-storico" class="page"><button onclick="nav('home')">← Indietro</button><div id="content-storico"></div></div>

    <div id="p-setup" class="page">
        <button onclick="nav('home')">← Indietro</button>
        <div class="card">
            <h3>Gestione Collaborator*</h3>
            <div id="list-collabs"></div>
            <input type="text" id="new-nome" placeholder="Nome"><input type="number" id="new-paga" placeholder="Paga €/h">
            <button class="btn-main" onclick="addCollab()">Aggiungi</button>
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzyvzW3pUKw8dRa1CMFJd9-3N6HVdSnPBDtqUutwN2fD3o8athmMRbWEul3-vVXyHKtGg/exec"; // <--- METTI IL TUO URL

    let db = JSON.parse(localStorage.getItem('familySync')) || {
        collabs: [{id:'1', nome:'Josie', paga:14, colore:'#F97316'}],
        logs: []
    };

    async function syncFromCloud() {
        document.getElementById('sync-banner').style.display = 'block';
        try {
            const response = await fetch(GOOGLE_URL);
            const cloudData = await response.json();
            // Trasforma i dati cloud nel formato dell'app
            db.logs = cloudData.map(l => ({
                nome: l.nome,
                data: l.data.split('T')[0], // Gestisce date ISO
                ore: l.ore,
                prezzo: l.prezzo,
                pagato: l.saldato === "SI"
            }));
            localStorage.setItem('familySync', JSON.stringify(db));
            document.getElementById('sync-banner').innerText = "✅ Sincronizzato con Excel";
            setTimeout(() => document.getElementById('sync-banner').style.display = 'none', 2000);
        } catch (e) {
            document.getElementById('sync-banner').innerText = "⚠️ Modalità Offline";
        }
    }

    function nav(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById('p-' + p).classList.add('active');
        if(p === 'riepilogo') renderRiepilogo(false);
        if(p === 'storico') renderRiepilogo(true);
        if(p === 'setup') renderCollabs();
        if(p === 'inserimento') renderIns();
    }

    async function saveData() {
        const col = db.collabs.find(c => c.id === document.getElementById('ins-chi').value);
        const record = { nome: col.nome, data: document.getElementById('ins-data').value, ore: parseFloat(document.getElementById('ins-ore').value), prezzo: col.paga, azione: "REGISTRA" };
        
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(record) });
        await syncFromCloud(); // Ricarica subito
        nav('home');
    }

    function renderRiepilogo(isStorico) {
        const cont = document.getElementById(isStorico ? 'content-storico' : 'content-riepilogo');
        const filtered = db.logs.filter(l => l.pagato === isStorico);
        const grouped = filtered.reduce((acc, l) => { (acc[l.nome] = acc[l.nome] || []).push(l); return acc; }, {});
        
        let html = `<h2>${isStorico ? 'Storico' : 'Da Saldare'}</h2>`;
        for(const nome in grouped) {
            const totEuro = grouped[nome].reduce((s, l) => s + (l.ore * l.prezzo), 0);
            html += `<div class="group-header"><span>${nome}</span><span>${totEuro}€</span></div>`;
            html += grouped[nome].map(l => `<div class="group-row"><span>${l.data}</span><span>${l.ore}h</span><span>${l.ore*l.prezzo}€</span></div>`).join('');
            if(!isStorico) html += `<button class="btn-main" onclick="salda('${nome}')">Salda ${nome}</button><br><br>`;
        }
        cont.innerHTML = html || "Nessun dato.";
    }

    async function salda(nome) {
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({azione:"SALDA_TUTTO", nome:nome}) });
        await syncFromCloud();
        nav('home');
    }

    function renderCollabs() {
        document.getElementById('list-collabs').innerHTML = db.collabs.map(c => `<div>${c.nome} (${c.paga}€/h)</div>`).join('');
    }

    function addCollab() {
        db.collabs.push({id:Date.now().toString(), nome:document.getElementById('new-nome').value, paga:parseFloat(document.getElementById('new-paga').value)});
        localStorage.setItem('familySync', JSON.stringify(db)); renderCollabs();
    }

    function renderIns() {
        document.getElementById('ins-chi').innerHTML = db.collabs.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        document.getElementById('ins-data').valueAsDate = new Date();
    }

    window.onload = syncFromCloud;
</script>
</body>
</html>
